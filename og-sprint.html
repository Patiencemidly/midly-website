<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }
  body {
    background: #C8F041;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    text-align: center;
    padding: 60px 80px;
  }
  .label {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.45);
    margin-bottom: 28px;
  }
  .headline {
    font-size: 80px;
    font-weight: 800;
    color: #0a0a0a;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .subtitle {
    font-size: 40px;
    font-weight: 600;
    color: #0a0a0a;
    line-height: 1.25;
    margin-bottom: 40px;
  }
  .footer {
    font-size: 28px;
    font-weight: 500;
    color: rgba(0,0,0,0.55);
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="label">Free 5-Day Guide</div>
    <div class="headline">Q2 Sprint Plan</div>
    <div class="subtitle">5 Days to a Working Contract Workflow</div>
    <div class="footer">Free &middot; app.midly.ai</div>
  </div>
</body>
</html>
