  tracking.html — Canonical tracking snippet reference for midly-website
  =========================================================================
  This file is NOT served to users. It is the source-of-truth for the
  tracking block inserted into every page's <head>.

  PLACEHOLDER IDs — replace each before deploying to production:
  ┌─────────────────────┬────────────────────────────────────────────────────┐
  │ Placeholder          │ Replace with                                       │
  ├─────────────────────┼────────────────────────────────────────────────────┤
  │ GA_MEASUREMENT_ID   │ e.g. G-XXXXXXXXXX  (from Google Analytics)         │
  │ GTM-XXXXXXX         │ e.g. GTM-AB12CD3   (from Google Tag Manager)       │
  │ FB_PIXEL_ID         │ e.g. 1234567890123 (from Meta Events Manager)      │
  │ CLARITY_PROJECT_ID  │ e.g. abcde12345    (from Microsoft Clarity)        │

  After replacing IDs, update each *.html file's tracking block to match.
-->

<!-- Analytics & Tracking — replace placeholder IDs before deploying -->

<!-- Google Analytics 4 (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'GA_MEASUREMENT_ID');
</script>
<!-- End Google Analytics 4 -->

<!-- Meta (Facebook) Pixel -->
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', 'FB_PIXEL_ID');
  fbq('track', 'PageView');
</script>
<noscript>
  <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=FB_PIXEL_ID&ev=PageView&noscript=1"/>
</noscript>
<!-- End Meta Pixel -->
